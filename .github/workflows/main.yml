# Pipeline de CI/CD do CodeConnect.
#
# - `analyze_and_test`: roda em todo PR/push pra `main` (flutter analyze +
#   flutter test). Não depende de nada externo.
# - `build_and_distribute` / `test_lab`: rodam só quando uma tag é enviada
#   (ex: `git tag v1.0.0 && git push origin v1.0.0`). Exigem um projeto
#   Firebase configurado — ver checklist de setup no README/PR.
name: CodeConnect CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"

jobs:
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Gerar código (json_serializable e i18n)
        run: |
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Analisar código (flutter analyze)
        run: flutter analyze

      - name: Rodar testes (unitários e widget)
        run: flutter test

  build_and_distribute:
    name: Build APK & Firebase App Distribution
    needs: analyze_and_test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Instalar dependências
        run: flutter pub get

      - name: Gerar código (json_serializable e i18n)
        run: |
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Build APK release
        run: flutter build apk --release

      - name: Publicar no Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: build/app/outputs/flutter-apk/app-release.apk

      - name: Salvar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  test_lab:
    name: Firebase Test Lab (Robo Test)
    needs: build_and_distribute
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Baixar APK gerado no job anterior
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      # gcloud retorna código de saída != 0 se o Test Lab reportar crash,
      # ANR ou outra falha no Robo Test — isso já derruba o pipeline.
      - name: Rodar Robo Test no Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type robo \
            --app build/app/outputs/flutter-apk/app-release.apk \
            --device model=Pixel2,version=30,locale=pt_BR,orientation=portrait \
            --timeout 5m
